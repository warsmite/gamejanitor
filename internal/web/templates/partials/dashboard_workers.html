{{define "dashboard_workers"}}
{{if .Workers}}
<div class="flex flex-wrap gap-2">
  {{range .Workers}}
  <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-surface-850/80 border border-surface-700/40 text-xs">
    {{if .IsHealthy}}
    <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-sm shadow-emerald-400/50 shrink-0"></span>
    {{else if .IsWarning}}
    <span class="w-2 h-2 rounded-full bg-amber-400 shadow-sm shadow-amber-400/50 shrink-0"></span>
    {{else}}
    <span class="w-2 h-2 rounded-full bg-red-400 shadow-sm shadow-red-400/50 shrink-0"></span>
    {{end}}
    <span class="font-mono text-surface-200">{{.LanIP}}</span>
    <span class="text-surface-500">{{.CPUCores}} cores</span>
    <span class="text-surface-500">·</span>
    <span class="text-surface-300">{{formatMB .MemoryAvailableMB}} free<span class="text-surface-500"> / {{formatMB .MemoryTotalMB}}</span></span>
    <span class="text-surface-500">·</span>
    <span class="text-surface-300">{{.GameserverCount}} <span class="text-surface-500">gameservers</span></span>
  </div>
  {{end}}
</div>
{{end}}
{{end}}
