<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}Gamejanitor{{end}}</title>
  <meta name="csrf-token" content="{{.CSRFToken}}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
  <script>
    function fmtMB(mb) {
      if (mb === 0) return 'unlimited';
      if (mb >= 1024) {
        const gb = mb / 1024;
        return (gb % 1 === 0) ? gb + ' GB' : gb.toFixed(1) + ' GB';
      }
      return mb + ' MB';
    }

    function gsHero(id, initialStatus) {
      return {
        eventSource: null,
        status: initialStatus,
        errorReason: '',
        path: window.location.pathname,
        query: null,
        container: null,
        stats: null,
        _statsInterval: null,
        connectSSE() {
          this.eventSource = new EventSource('/api/events');
          this.eventSource.addEventListener('status', (e) => {
            const data = JSON.parse(e.data);
            if (data.gameserver_id === id) {
              this.refreshStatus();
            }
          });
          this.refreshStatus();
          this._startStatsPolling();
        },
        _startStatsPolling() {
          this._fetchStats();
          this._statsInterval = setInterval(() => this._fetchStats(), 10000);
        },
        async _fetchStats() {
          if (this.status !== 'running' && this.status !== 'started') {
            this.stats = null;
            return;
          }
          try {
            const resp = await fetch('/api/gameservers/' + id + '/stats');
            const json = await resp.json();
            if (json.data) {
              this.stats = json.data;
            }
          } catch (_) {}
        },
        async refreshStatus() {
          try {
            const resp = await fetch('/api/gameservers/' + id + '/status');
            const json = await resp.json();
            if (json.data) {
              this.status = json.data.status;
              this.errorReason = json.data.error_reason || '';
              this.query = json.data.query || null;
              this.container = json.data.container || null;
            }
          } catch (_) {}
          this._fetchStats();
          window.dispatchEvent(new CustomEvent('gs-status-changed', { detail: { id: id, status: this.status } }));
        },
        destroy() {
          if (this.eventSource) this.eventSource.close();
          if (this._statsInterval) clearInterval(this._statsInterval);
        }
      };
    }

    function logTail(id, status) {
      return {
        lines: [],
        _interval: null,
        start() {
          this._fetch();
          if (status !== 'error') {
            this._interval = setInterval(() => this._fetch(), 2000);
          }
        },
        destroy() {
          if (this._interval) clearInterval(this._interval);
        },
        async _fetch() {
          try {
            const res = await fetch('/api/gameservers/' + id + '/logs?tail=5');
            if (!res.ok) return;
            const json = await res.json();
            const lines = json.data?.lines;
            if (lines && lines.length > 0) {
              const last5 = lines.slice(-5);
              while (last5.length < 5) last5.unshift('');
              this.lines = last5;
              this.$nextTick(() => {
                const el = this.$refs.logScroll;
                if (el) el.scrollTop = el.scrollHeight;
              });
            }
          } catch (_) {}
        }
      };
    }
  </script>
  <script src="/static/alpine.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: linear-gradient(145deg, #12121f 0%, #1a1a2e 50%, #151525 100%); background-attachment: fixed; }
    .noise-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .card-glow { transition: box-shadow 0.3s ease, border-color 0.3s ease; }
    .card-glow:hover { box-shadow: 0 0 20px rgba(255,122,17,0.15); border-color: rgba(255,122,17,0.3); }
    .glass { background: rgba(42,42,61,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .stopped-card > * { filter: grayscale(40%); opacity: 0.7; }
  </style>
</head>
<body class="min-h-full font-body text-surface-200 antialiased" hx-boost="true" hx-target="#content" hx-swap="innerHTML" hx-push-url="true" hx-headers='{"X-CSRF-Token": "{{.CSRFToken}}"}'>
  <div class="noise-overlay"></div>

  <div class="relative z-10 flex flex-col min-h-full">
    <!-- Top Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-surface-800/80" x-data="{ mobileOpen: false, path: window.location.pathname }" @htmx:pushed-into-history.window="path = window.location.pathname">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-14">
          <!-- Logo -->
          <a href="/" class="flex items-center gap-2.5 group">
            <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-accent-500 to-accent-700 flex items-center justify-center shadow-lg shadow-accent-500/20">
              <img src="/static/logo.svg" alt="Gamejanitor" class="w-4 h-4">
            </div>
            <span class="font-display font-bold text-lg text-white tracking-tight group-hover:text-accent-400 transition-colors">GameJanitor</span>
          </a>

          <!-- Desktop Nav -->
          <div class="hidden sm:flex items-center gap-1">
            <a href="/" class="nav-link px-3 py-1.5 rounded-lg text-sm font-medium transition-all"
               :class="path === '/' ? 'text-white bg-surface-800/60' : 'text-surface-300 hover:text-white hover:bg-surface-800/60'">Dashboard</a>
            <a href="/games" class="nav-link px-3 py-1.5 rounded-lg text-sm font-medium transition-all"
               :class="path.startsWith('/games') ? 'text-white bg-surface-800/60' : 'text-surface-300 hover:text-white hover:bg-surface-800/60'">Games</a>
            <a href="/settings" class="nav-link px-3 py-1.5 rounded-lg text-sm font-medium transition-all"
               :class="path.startsWith('/settings') ? 'text-white bg-surface-800/60' : 'text-surface-300 hover:text-white hover:bg-surface-800/60'">
              <svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </a>
          </div>

          <!-- Mobile hamburger -->
          <button @click="mobileOpen = !mobileOpen" class="sm:hidden p-2 text-surface-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
        </div>

        <!-- Mobile dropdown -->
        <div x-show="mobileOpen" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-1"
             class="sm:hidden pb-3 border-t border-surface-800/50 mt-1 pt-2 space-y-1">
          <a href="/" @click="mobileOpen = false" class="block px-3 py-2 rounded-lg text-sm font-medium"
             :class="path === '/' ? 'text-white bg-surface-800/60' : 'text-surface-300 hover:text-white hover:bg-surface-800/60'">Dashboard</a>
          <a href="/games" @click="mobileOpen = false" class="block px-3 py-2 rounded-lg text-sm font-medium"
             :class="path.startsWith('/games') ? 'text-white bg-surface-800/60' : 'text-surface-300 hover:text-white hover:bg-surface-800/60'">Games</a>
          <a href="/settings" @click="mobileOpen = false" class="block px-3 py-2 rounded-lg text-sm font-medium"
             :class="path.startsWith('/settings') ? 'text-white bg-surface-800/60' : 'text-surface-300 hover:text-white hover:bg-surface-800/60'">Settings</a>
        </div>
      </div>
    </nav>

    {{if not .AuthEnabled}}
    <div class="bg-amber-500/10 border-b border-amber-500/30">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-2 flex items-center gap-2 text-sm text-amber-300">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span>Authentication is disabled. Anyone with network access can control your gameservers.</span>
        <a href="/settings" class="ml-auto text-amber-200 hover:text-white font-medium transition-colors whitespace-nowrap">Enable in Settings</a>
      </div>
    </div>
    {{end}}

    <!-- Main Content -->
    <main id="content" class="flex-1">
      {{block "content" .}}{{end}}
    </main>
  </div>
</body>
</html>
