id: palworld
name: "Palworld"
base_image: ghcr.io/0xkowalskidev/gamejanitor/steamcmd
recommended_memory_mb: 8192
disabled_capabilities: ["query"]
ready_pattern: 'Setting breakpad minidump AppID'
ready_timeout: 600
assets:
  icon: palworld-icon.ico
  grid: palworld-grid.png
  hero: palworld-hero.png

ports:
  - name: game
    port: 8211
    protocol: udp
  - name: rcon
    port: 25575
    protocol: tcp

env:
  - key: SERVER_NAME
    default: "Gamejanitor Palworld Server"
    label: "Server Name"
  - key: MAX_PLAYERS
    default: "32"
    label: "Max Players"
    type: number
  - key: ADMIN_PASSWORD
    default: ""
    label: "Admin Password"
    autogenerate: password
  - key: SERVER_PASSWORD
    default: ""
    label: "Server Password"
  - key: DIFFICULTY
    default: "Normal"
    label: "Difficulty"
    type: select
    options: ["Casual", "Normal", "Hard"]
  - key: GAME_PORT
    default: "8211"
    system: true
  - key: RCON_PORT
    default: "25575"
    system: true
  - key: SAVE_TIMEOUT_SECONDS
    default: "15"
    system: true
