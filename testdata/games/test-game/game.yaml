id: test-game
name: "Test Game"
description: "Minimal game definition for automated tests"

ports:
  - name: game
    port: 27015
    protocol: udp
  - name: query
    port: 27016
    protocol: udp

query:
  protocol: source
  supports: [players]

instance:
  recommended_memory_mb: 512
  ready_pattern: 'Server is ready'
  env:
    - key: SERVER_NAME
      default: "Test Server"
      label: "Server Name"
    - key: SERVER_PASSWORD
      default: ""
      label: "Server Password"
      autogenerate: password
    - key: MAX_PLAYERS
      default: "16"
      label: "Max Players"
      type: number
    - key: GAME_MODE
      default: "survival"
      label: "Game Mode"
      type: select
      options: ["survival", "creative", "adventure"]
    - key: REQUIRED_VAR
      label: "Required Variable"
      required: true
    - key: INSTALL_TRIGGER
      default: "stable"
      label: "Game Version"
      triggers_install: true
    - key: GAME_PORT
      default: "27015"
      system: true
    - key: QUERY_PORT
      default: "27016"
      system: true
    # Failure injection for e2e tests — see scripts/start-server.
    # hidden: true keeps them out of the UI but allows API overrides.
    # NOT system: true, which would block API overrides in mergeEnv.
    - key: TEST_BEHAVIOR
      hidden: true
    - key: TEST_INSTALL_BEHAVIOR
      hidden: true
    - key: READY_DELAY_SECONDS
      hidden: true
    - key: INSTALL_DELAY_SECONDS
      hidden: true
    - key: INSTALL_FILE_MB
      hidden: true

  mods:
    categories:
      - name: Mods
        install_path: /data/mods
