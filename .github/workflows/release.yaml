name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build UI
        run: cd ui && npm install && npm run build

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o gamejanitor .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: gamejanitor
          generate_release_notes: true
