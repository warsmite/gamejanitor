id: counter-strike-2
name: "Counter-Strike 2"
aliases: [cs2, cs]
description: "Competitive tactical FPS with community and workshop server support"
base_image: ghcr.io/warsmite/gamejanitor/steamcmd
recommended_memory_mb: 1024
disabled_capabilities: []
ready_pattern: 'GC Connection established'
assets:
  icon: counter-strike-2-icon.ico

ports:
  - name: game
    port: 27015
    protocol: udp
  - name: rcon
    port: 27015
    protocol: tcp

env:
  - key: HOSTNAME
    default: "Gamejanitor CS2 Server"
    label: "Server Name"
  - key: MAXPLAYERS
    default: "16"
    label: "Max Players"
    type: number
  - key: RCON_PASSWORD
    default: ""
    label: "RCON Password"
    autogenerate: password
  - key: GAME_TYPE
    default: "0"
    label: "Game Type"
    type: select
    options: ["0", "1", "2", "3"]
  - key: GAME_MODE
    default: "1"
    label: "Game Mode"
    type: select
    options: ["0", "1", "2"]
  - key: MAP
    default: "de_dust2"
    label: "Starting Map"
  - key: GSLT
    default: ""
    label: "Game Server Login Token (GSLT)"
    notice: 'Required for public servers. Get one at <a href="https://steamcommunity.com/dev/managegameservers" target="_blank" class="underline text-accent-400 hover:text-accent-300">Steam</a>.'
  - key: GAME_PORT
    default: "27015"
    system: true
  - key: SAVE_TIMEOUT_SECONDS
    default: "5"
    system: true

mods:
  sources:
    - type: workshop
      app_id: 730
      install_path: /data/server/game/csgo/maps/workshop
