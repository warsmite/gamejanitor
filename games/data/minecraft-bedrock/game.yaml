id: minecraft-bedrock
name: "Minecraft: Bedrock Edition"
aliases: [bedrock, mcbe]
description: "Cross-platform Minecraft for mobile, console, and Windows 10 players"

ports:
  - name: game
    port: 19132
    protocol: udp

query:
  protocol: raknet

container:
  image: ghcr.io/warsmite/gamejanitor/base
  recommended_memory_mb: 1024
  ready_pattern: 'Server started'
  disabled_capabilities: []
  env:
    - key: SERVER_NAME
      default: "Gamejanitor Bedrock Server"
      label: "Server Name"
    - key: GAMEMODE
      default: "survival"
      label: "Game Mode"
      type: select
      options: ["survival", "creative", "adventure"]
    - key: DIFFICULTY
      default: "normal"
      label: "Difficulty"
      type: select
      options: ["peaceful", "easy", "normal", "hard"]
    - key: MAX_PLAYERS
      default: "10"
      label: "Max Players"
      type: number
    - key: LEVEL_NAME
      default: "Gamejanitor"
      label: "World Name"
    - key: ONLINE_MODE
      default: "true"
      label: "Online Mode (Xbox Auth)"
      type: boolean
    - key: ALLOW_CHEATS
      default: "false"
      label: "Allow Cheats"
      type: boolean
    - key: VIEW_DISTANCE
      default: "32"
      label: "View Distance"
      type: number
    - key: SERVER_PORT
      default: "19132"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "5"
      system: true
