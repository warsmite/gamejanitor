id: 7-days-to-die
name: "7 Days to Die"
aliases: [7dtd, 7d2d]
description: "Open-world zombie survival with base building and horde nights"
app_id: 251570
server_app_id: 294420

ports:
  - name: game
    port: 26900
    protocol: udp
  - name: game-tcp
    port: 26900
    protocol: tcp

query:
  protocol: source
  supports: [players, rules, keywords]

instance:
  image: ghcr.io/warsmite/gamejanitor/base
  recommended_memory_mb: 8192
  ready_pattern: 'GameServer.Init successful'
  disabled_capabilities: []
  env:
    - key: SERVER_NAME
      default: "Gamejanitor 7D2D Server"
      label: "Server Name"
    - key: SERVER_PASSWORD
      default: ""
      label: "Server Password"
    - key: MAX_PLAYERS
      default: "8"
      label: "Max Players"
      type: number
    - key: GAME_WORLD
      default: "Navezgane"
      label: "Game World"
      type: select
      options: ["Navezgane", "RWG"]
    - key: WORLD_GEN_SEED
      default: "Gamejanitor"
      label: "World Gen Seed"
    - key: GAME_DIFFICULTY
      default: "2"
      label: "Difficulty"
      type: select
      options: ["0", "1", "2", "3", "4", "5"]
    - key: DAY_NIGHT_LENGTH
      default: "60"
      label: "Day/Night Length (minutes)"
      type: number
    - key: GAME_PORT
      default: "26900"
      system: true
    - key: TELNET_PORT
      default: "8081"
      system: true
    - key: TELNET_PASSWORD
      default: ""
      system: true
      autogenerate: password
    - key: SAVE_TIMEOUT_SECONDS
      default: "15"
      system: true
