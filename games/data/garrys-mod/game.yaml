id: garrys-mod
name: "Garry's Mod"
aliases: [gmod]
description: "Physics sandbox powered by the Source engine with endless game modes"
app_id: 4000
server_app_id: 4020

ports:
  - name: game
    port: 27015
    protocol: udp
  - name: rcon
    port: 27015
    protocol: tcp

query:
  protocol: source
  supports: [players, rules, keywords]

instance:
  recommended_memory_mb: 1024
  ready_pattern: 'gameserver Steam ID'
  disabled_capabilities: []
  env:
    - key: HOSTNAME
      default: "Gamejanitor GMod Server"
      label: "Server Name"
    - key: MAXPLAYERS
      default: "16"
      label: "Max Players"
      type: number
    - key: RCON_PASSWORD
      default: ""
      label: "RCON Password"
      autogenerate: password
    - key: GAMEMODE
      default: "sandbox"
      label: "Game Mode"
      type: select
      options: ["sandbox", "terrortown", "prop_hunt", "murder", "deathrun"]
    - key: MAP
      default: "gm_flatgrass"
      label: "Starting Map"
    - key: GAME_PORT
      default: "27015"
      system: true
    - key: RCON_PORT
      default: "27015"
      system: true
    - key: WORKSHOP_COLLECTION
      default: ""
      label: "Workshop Collection ID"
      notice: "Create a collection at steamcommunity.com/workshop, add your addons, then paste the collection ID here. The server downloads all addons at startup."
    - key: SAVE_TIMEOUT_SECONDS
      default: "5"
      system: true

assets:
  icon: garrys-mod-icon.ico
