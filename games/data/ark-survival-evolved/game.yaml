id: ark-survival-evolved
name: "ARK: Survival Evolved"
aliases: [ark, ase]
description: "Dinosaur survival sandbox with taming, building, and massive maps"
app_id: 346110

ports:
  - name: game
    port: 7777
    protocol: udp
  - name: query
    port: 27015
    protocol: udp
  - name: rcon
    port: 27020
    protocol: tcp

query:
  protocol: source
  supports: [players, rules, keywords]
  notes: "Player list and max players may be inaccurate"

container:
  image: ghcr.io/warsmite/gamejanitor/steamcmd
  recommended_memory_mb: 8192
  ready_pattern: 'Full Startup:'
  disabled_capabilities: []
  env:
    - key: SESSION_NAME
      default: "Gamejanitor ARK Server"
      label: "Session Name"
    - key: MAX_PLAYERS
      default: "70"
      label: "Max Players"
      type: number
    - key: ADMIN_PASSWORD
      default: ""
      label: "Admin Password"
      autogenerate: password
    - key: SERVER_PASSWORD
      default: ""
      label: "Server Password"
    - key: MAP
      default: "TheIsland"
      label: "Map"
      type: select
      options: ["TheIsland", "TheCenter", "ScorchedEarth_P", "Ragnarok", "Aberration_P", "Extinction", "Valguero_P", "Genesis", "CrystalIsles", "LostIsland", "Fjordur"]
    - key: ENABLE_BATTLEYE
      default: "false"
      label: "BattlEye Anti-Cheat"
      type: boolean
      notice: "Enable BattlEye anti-cheat. Players must have BattlEye installed to connect."
    - key: GAME_PORT
      default: "7777"
      system: true
    - key: QUERY_PORT
      default: "27015"
      system: true
    - key: RCON_PORT
      default: "27020"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "30"
      system: true
  mods:
    sources:
      - type: workshop
        app_id: 346110
        install_path: /data/server/ShooterGame/Content/Mods

assets:
  icon: ark-survival-evolved-icon.ico
