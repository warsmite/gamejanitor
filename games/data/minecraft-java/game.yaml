id: minecraft-java
name: "Minecraft: Java Edition"
aliases: [minecraft, mc, mcje, java]
description: "The original Minecraft, supporting vanilla, Paper, Forge, and Fabric servers"

ports:
  - name: game
    port: 25565
    protocol: tcp
  - name: rcon
    port: 25575
    protocol: tcp

query:
  protocol: minecraft
  supports: [players, mods]
  notes: "Player list limited to server's sample (usually 12 max)"

container:
  image: ghcr.io/warsmite/gamejanitor/java
  recommended_memory_mb: 2048
  ready_pattern: 'Done \(\d+\.\d+s\)! For help, type "help"'
  disabled_capabilities: []
  env:
    - key: EULA
      default: "false"
      label: "Accept Minecraft EULA"
      type: boolean
      consent_required: true
      notice: "You must agree to the [Minecraft EULA](https://aka.ms/MinecraftEULA) to run this server."
    - key: MINECRAFT_VERSION
      default: "latest"
      label: "Version"
      type: select
      group: server
      dynamic_options:
        source: mojang-versions
      triggers_install: true
    - key: MODLOADER
      default: "vanilla"
      hidden: true
      triggers_install: true
    - key: GAMEMODE
      default: "survival"
      label: "Game Mode"
      type: select
      group: gameplay
      options: ["survival", "creative", "adventure", "spectator"]
    - key: MAX_PLAYERS
      default: "20"
      label: "Max Players"
      type: number
      group: server
    - key: DIFFICULTY
      default: "normal"
      label: "Difficulty"
      type: select
      group: gameplay
      options: ["peaceful", "easy", "normal", "hard"]
    - key: MOTD
      default: "A Gamejanitor Server"
      label: "Message of the Day"
      group: server
    - key: PVP
      default: "true"
      label: "PvP"
      type: boolean
      group: gameplay
    - key: HARDCORE
      default: "false"
      label: "Hardcore"
      type: boolean
      group: gameplay
    - key: ALLOW_FLIGHT
      default: "false"
      label: "Allow Flight"
      type: boolean
      group: gameplay
      notice: "Enable if using mods that trigger flight detection (e.g. movement mods)."
    - key: SPAWN_PROTECTION
      default: "16"
      label: "Spawn Protection Radius"
      type: number
      group: gameplay
    - key: ONLINE_MODE
      default: "true"
      label: "Online Mode"
      type: boolean
      group: server
      notice: "Requires Minecraft account authentication. Disable for offline/cracked servers."
    - key: WHITELIST
      default: "false"
      label: "Whitelist"
      type: boolean
      group: server
    - key: PLAYER_IDLE_TIMEOUT
      default: "0"
      label: "AFK Kick (minutes)"
      type: number
      group: server
      notice: "Minutes before idle players are kicked. 0 to disable."
    - key: SEED
      default: ""
      label: "World Seed"
      group: world
    - key: LEVEL_NAME
      default: "world"
      label: "World Name"
      group: world
    - key: GENERATE_STRUCTURES
      default: "true"
      label: "Generate Structures"
      type: boolean
      group: world
    - key: MAX_WORLD_SIZE
      default: "29999984"
      label: "Max World Size"
      type: number
      group: world
      notice: "World border distance from center in blocks."
    - key: VIEW_DISTANCE
      default: "10"
      label: "View Distance"
      type: number
      group: performance
      notice: "Chunk render distance (3-32). Lower values reduce memory and CPU usage."
    - key: SIMULATION_DISTANCE
      default: "10"
      label: "Simulation Distance"
      type: number
      group: performance
      notice: "Entity update range in chunks (3-32). Lower values improve TPS on busy servers."
    - key: RESOURCE_PACK
      default: ""
      label: "Resource Pack URL"
      group: resource_pack
    - key: REQUIRE_RESOURCE_PACK
      default: "false"
      label: "Require Resource Pack"
      type: boolean
      group: resource_pack
      notice: "Players who decline the resource pack will be disconnected."
    - key: RCON_PASSWORD
      default: ""
      label: "RCON Password"
      autogenerate: password
    - key: RCON_PORT
      default: "25575"
      system: true
    - key: SERVER_PORT
      default: "25565"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "5"
      system: true
  mods:
    loader:
      env_key: MODLOADER
      label: "Mod Loader"
      type: select
      options: ["vanilla", "paper", "forge", "fabric"]
      default: "vanilla"
    sources:
      - type: modrinth
        install_paths:
          fabric: /data/mods
          forge: /data/mods
          paper: /data/plugins
        loaders:
          fabric: fabric
          forge: forge
          paper: paper
        loader_env: MODLOADER
        version_env: MINECRAFT_VERSION

assets:
  icon: minecraft-icon.ico
