id: minecraft-java
name: "Minecraft: Java Edition"
base_image: ghcr.io/warsmite/gamejanitor/java
recommended_memory_mb: 2048
disabled_capabilities: []
ready_pattern: 'Done \(\d+\.\d+s\)! For help, type "help"'
assets:
  icon: minecraft-icon.ico

ports:
  - name: game
    port: 25565
    protocol: tcp

env:
  - key: EULA
    default: "false"
    label: "Accept Minecraft EULA"
    type: boolean
    required: true
    notice: 'You must agree to the <a href="https://aka.ms/MinecraftEULA" target="_blank" class="underline text-accent-400 hover:text-accent-300">Minecraft EULA</a> to run this server.'
  - key: MINECRAFT_VERSION
    default: "latest"
    label: "Version"
    type: version-select
    triggers_install: true
  - key: MODLOADER
    default: "vanilla"
    label: "Mod Loader"
    type: select
    options: ["vanilla", "paper", "forge", "fabric"]
    triggers_install: true
  - key: GAMEMODE
    default: "survival"
    label: "Game Mode"
    type: select
    options: ["survival", "creative", "adventure", "spectator"]
  - key: MAX_PLAYERS
    default: "20"
    label: "Max Players"
    type: number
  - key: DIFFICULTY
    default: "normal"
    label: "Difficulty"
    type: select
    options: ["peaceful", "easy", "normal", "hard"]
  - key: MOTD
    default: "A Gamejanitor Server"
    label: "Message of the Day"
  - key: PVP
    default: "true"
    label: "PvP"
    type: boolean
  - key: SERVER_PORT
    default: "25565"
    system: true
  - key: SAVE_TIMEOUT_SECONDS
    default: "5"
    system: true
