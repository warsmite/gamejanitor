id: palworld
name: "Palworld"
aliases: [pw]
description: "Open-world survival with creature collecting, base building, and multiplayer"

server_app_id: 2394010
ports:
  - name: game
    port: 8211
    protocol: udp
  - name: rcon
    port: 25575
    protocol: tcp

query:
  protocol: eos
  supports: [players]
  notes: "Player names are opaque EOS IDs; may fail on shared IPs (15-session API limit)"
  eos:
    client_id: "xyza78916PZ5DF0fAahu4tnrKKyFpqRE"
    client_secret: "j0NapLEPm3R3EOrlQiM8cRLKq3Rt02ZVVwT0SkZstSg"
    deployment_id: "0a18471f93d448e2a1f60e47e03d3413"
    use_external_auth: true
    attributes:
      name: NAME_s
      map: MAPNAME_s
      password: ISPASSWORD_b
      version: VERSION_s

instance:
  recommended_memory_mb: 8192
  ready_pattern: 'Setting breakpad minidump AppID'
  disabled_capabilities: []
  env:
    - key: SERVER_NAME
      default: "Gamejanitor Palworld Server"
      label: "Server Name"
    - key: MAX_PLAYERS
      default: "32"
      label: "Max Players"
      type: number
    - key: ADMIN_PASSWORD
      default: ""
      label: "Admin Password"
      autogenerate: password
    - key: SERVER_PASSWORD
      default: ""
      label: "Server Password"
    - key: DIFFICULTY
      default: "Normal"
      label: "Difficulty"
      type: select
      options: ["Casual", "Normal", "Hard"]
    - key: GAME_PORT
      default: "8211"
      system: true
    - key: RCON_PORT
      default: "25575"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "15"
      system: true

assets:
  icon: palworld-icon.ico
