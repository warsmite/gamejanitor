id: valheim
name: "Valheim"
aliases: []
description: "Viking-themed survival and exploration in a procedurally generated world"
app_id: 892970

ports:
  - name: game
    port: 2456
    protocol: udp
  - name: query
    port: 2457
    protocol: udp

query:
  protocol: source
  supports: [players, rules, keywords]

container:
  image: ghcr.io/warsmite/gamejanitor/steamcmd
  recommended_memory_mb: 2048
  ready_pattern: 'Game server connected'
  disabled_capabilities: ["command"]
  env:
    - key: SERVER_NAME
      default: "Gamejanitor Valheim Server"
      label: "Server Name"
    - key: WORLD_NAME
      default: "Gamejanitor"
      label: "World Name"
    - key: SERVER_PASSWORD
      default: ""
      label: "Server Password"
    - key: GAME_PORT
      default: "2456"
      system: true
    - key: QUERY_PORT
      default: "2457"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "15"
      system: true

assets:
  icon: valheim-icon.ico
