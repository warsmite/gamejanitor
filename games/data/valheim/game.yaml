id: valheim
name: "Valheim"
base_image: ghcr.io/warsmite/gamejanitor/steamcmd
recommended_memory_mb: 2048
disabled_capabilities: ["command"]
ready_pattern: 'Game server connected'
assets:
  icon: valheim-icon.ico

ports:
  - name: game
    port: 2456
    protocol: udp
  - name: query
    port: 2457
    protocol: udp

env:
  - key: SERVER_NAME
    default: "Gamejanitor Valheim Server"
    label: "Server Name"
  - key: WORLD_NAME
    default: "Gamejanitor"
    label: "World Name"
  - key: SERVER_PASSWORD
    default: ""
    label: "Server Password"
  - key: GAME_PORT
    default: "2456"
    system: true
  - key: QUERY_PORT
    default: "2457"
    system: true
  - key: SAVE_TIMEOUT_SECONDS
    default: "15"
    system: true
