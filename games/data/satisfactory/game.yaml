id: satisfactory
name: "Satisfactory"
aliases: []
description: "First-person factory building and automation in an alien world"
app_id: 526870
server_app_id: 1690800

ports:
  - name: game
    port: 7777
    protocol: udp
  - name: api
    port: 7777
    protocol: tcp
  - name: reliable
    port: 8888
    protocol: tcp

# No query section — Satisfactory has no standard query protocol

instance:
  recommended_memory_mb: 8192
  ready_pattern: 'Server API listening on'
  disabled_capabilities: ["command", "save"]
  env:
    - key: SERVER_NAME
      default: "Gamejanitor Satisfactory Server"
      label: "Server Name"
    - key: MAX_PLAYERS
      default: "4"
      label: "Max Players"
      type: number
    - key: GAME_PORT
      default: "7777"
      system: true
    - key: RELIABLE_PORT
      default: "8888"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "15"
      system: true

assets:
  icon: satisfactory-icon.ico
