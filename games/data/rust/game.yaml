id: rust
name: "Rust"
aliases: []
description: "Hardcore multiplayer survival with building, raiding, and PvP"
app_id: 252490

ports:
  - name: game
    port: 28015
    protocol: udp
  - name: query
    port: 28017
    protocol: udp
  - name: rcon
    port: 28016
    protocol: tcp

query:
  protocol: source
  supports: [players, rules, keywords]

container:
  image: ghcr.io/warsmite/gamejanitor/steamcmd
  recommended_memory_mb: 6144
  ready_pattern: 'Server startup complete'
  disabled_capabilities: []
  env:
    - key: SERVER_MAXPLAYERS
      default: "50"
      label: "Max Players"
      type: number
    - key: SERVER_HOSTNAME
      default: "Gamejanitor Rust Server"
      label: "Server Name"
    - key: SERVER_WORLDSIZE
      default: "3000"
      label: "World Size"
      type: number
    - key: RCON_PASSWORD
      default: ""
      label: "RCON Password"
      autogenerate: password
    - key: OXIDE_ENABLED
      default: "false"
      hidden: true
    - key: EAC_ENABLED
      default: "true"
      label: "Easy Anti-Cheat (EAC)"
      type: boolean
    - key: SERVER_PORT
      default: "28015"
      system: true
    - key: QUERY_PORT
      default: "28017"
      system: true
    - key: RCON_PORT
      default: "28016"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "15"
      system: true
  mods:
    loader:
      env_key: OXIDE_ENABLED
      label: "Oxide (uMod)"
      type: boolean
      default: "false"
    sources:
      - type: umod
        install_path: /data/server/oxide/plugins
        file_extension: .cs
        requires_env:
          OXIDE_ENABLED: "true"

assets:
  icon: rust-icon.ico
