id: rust
name: "Rust"
aliases: []
description: "Hardcore multiplayer survival with building, raiding, and PvP"
app_id: 252490

ports:
  - name: game
    port: 28015
    protocol: udp
  - name: query
    port: 28017
    protocol: udp
  - name: rcon
    port: 28016
    protocol: tcp

query:
  protocol: source
  supports: [players, rules, keywords]

container:
  image: ghcr.io/warsmite/gamejanitor/steamcmd
  recommended_memory_mb: 8192
  ready_pattern: 'Server startup complete'
  disabled_capabilities: []
  env:
    - key: SERVER_MAXPLAYERS
      default: "50"
      label: "Max Players"
      type: number
    - key: SERVER_HOSTNAME
      default: "Gamejanitor Rust Server"
      label: "Server Name"
    - key: SERVER_WORLDSIZE
      default: "3000"
      label: "World Size"
      type: number
    - key: RCON_PASSWORD
      default: ""
      label: "RCON Password"
      autogenerate: password
    - key: MOD_FRAMEWORK
      default: "none"
      hidden: true
    - key: EAC_ENABLED
      default: "true"
      label: "Easy Anti-Cheat (EAC)"
      type: boolean
    - key: SERVER_IDENTITY
      default: "gamejanitor"
      label: "Server Identity"
      group: server
    - key: SERVER_PORT
      default: "28015"
      system: true
    - key: QUERY_PORT
      default: "28017"
      system: true
    - key: RCON_PORT
      default: "28016"
      system: true
    - key: SAVE_TIMEOUT_SECONDS
      default: "15"
      system: true
  mods:
    loader:
      env: MOD_FRAMEWORK
      options:
        none:
          mod_sources: []
        oxide:
          mod_sources: [umod]
        carbon:
          mod_sources: [umod]

    categories:
      - name: Plugins
        sources:
          - name: umod
            delivery: file
            install_path: /data/server/oxide/plugins
            config:
              category: rust

assets:
  icon: rust-icon.ico
