syntax = "proto3";

package worker;

option go_package = "github.com/warsmite/gamejanitor/worker/pb";

// WorkerService is the gRPC interface between controller and worker agents.
// Maps 1:1 to the Go Worker interface in internal/worker/worker.go.
service WorkerService {
    // Instance lifecycle
    rpc PullImage(PullImageRequest) returns (PullImageResponse);
    rpc CreateInstance(CreateInstanceRequest) returns (CreateInstanceResponse);
    rpc StartInstance(StartInstanceRequest) returns (StartInstanceResponse);
    rpc RunInstall(RunInstallRequest) returns (RunInstallResponse);
    rpc StopInstance(StopInstanceRequest) returns (StopInstanceResponse);
    rpc RemoveInstance(RemoveInstanceRequest) returns (RemoveInstanceResponse);
    rpc InspectInstance(InspectInstanceRequest) returns (InspectInstanceResponse);
    rpc Exec(ExecRequest) returns (ExecResponse);
    rpc InstanceLogs(InstanceLogsRequest) returns (stream DataChunk);
    rpc InstanceStats(InstanceStatsRequest) returns (InstanceStatsResponse);

    // Volumes
    rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
    rpc RemoveVolume(RemoveVolumeRequest) returns (RemoveVolumeResponse);
    rpc VolumeSize(VolumeSizeRequest) returns (VolumeSizeResponse);
    rpc BackupVolume(BackupVolumeRequest) returns (stream DataChunk);
    rpc RestoreVolume(stream RestoreVolumeRequest) returns (RestoreVolumeResponse);

    // File operations
    rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
    rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
    rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
    rpc WriteFileStream(stream WriteFileStreamRequest) returns (WriteFileStreamResponse);
    rpc DeletePath(DeletePathRequest) returns (DeletePathResponse);
    rpc CreateDirectory(CreateDirectoryRequest) returns (CreateDirectoryResponse);
    rpc RenamePath(RenamePathRequest) returns (RenamePathResponse);
    rpc DownloadFile(DownloadFileRequest) returns (DownloadFileResponse);

    // Copy operations (streaming for large data)
    rpc CopyFromInstance(CopyFromInstanceRequest) returns (CopyFromInstanceResponse);
    rpc CopyToInstance(CopyToInstanceRequest) returns (CopyToInstanceResponse);
    rpc CopyDirFromInstance(CopyDirFromInstanceRequest) returns (stream DataChunk);
    rpc CopyTarToInstance(stream CopyTarToInstanceRequest) returns (CopyTarToInstanceResponse);

    // Instance state — authoritative state stream from worker to controller
    rpc WatchInstanceStates(WatchInstanceStatesRequest) returns (stream InstanceStateUpdate);
    rpc GetAllInstanceStates(GetAllInstanceStatesRequest) returns (GetAllInstanceStatesResponse);

    // Discovery
    rpc ListGameserverInstances(ListGameserverInstancesRequest) returns (ListGameserverInstancesResponse);

    // Health
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

    // Game scripts — worker extracts scripts locally from embedded game data
    rpc PrepareGameScripts(PrepareGameScriptsRequest) returns (PrepareGameScriptsResponse);

    // Steam depot — worker downloads game files, streams progress back
    rpc EnsureDepot(EnsureDepotRequest) returns (stream EnsureDepotProgress);

    // Steam Workshop — download a UGC item to a volume path
    rpc DownloadWorkshopItem(DownloadWorkshopItemRequest) returns (DownloadWorkshopItemResponse);

    // Copy depot files to volume — done host-side to avoid container OOM on large depots
    rpc CopyDepotToVolume(CopyDepotToVolumeRequest) returns (CopyDepotToVolumeResponse);
}

// ControllerService runs on the controller and accepts worker registrations/heartbeats.
service ControllerService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc ValidateSFTPLogin(SFTPLoginRequest) returns (SFTPLoginResponse);
}

// Shared

message DataChunk {
    bytes data = 1;
}

// Instance lifecycle

message PullImageRequest {
    string image = 1;
}
message PullImageResponse {}

message PortBinding {
    int32 host_port = 1;
    int32 instance_port = 2;
    string protocol = 3;
}

message CreateInstanceRequest {
    string name = 1;
    string image = 2;
    repeated string env = 3;
    repeated PortBinding ports = 4;
    string volume_name = 5;
    int32 memory_limit_mb = 6;
    double cpu_limit = 7;
    repeated string entrypoint = 8;
    string user = 9;
    repeated string binds = 10;
    bool cpu_enforced = 11;
}
message CreateInstanceResponse {
    string instance_id = 1;
}

message StartInstanceRequest {
    string instance_id = 1;
    string ready_pattern = 2; // regex — empty means promote to running immediately
}
message StartInstanceResponse {}

message StopInstanceRequest {
    string instance_id = 1;
    int32 timeout_seconds = 2;
}
message StopInstanceResponse {}

message RemoveInstanceRequest {
    string instance_id = 1;
}
message RemoveInstanceResponse {}

message InspectInstanceRequest {
    string instance_id = 1;
}
message InspectInstanceResponse {
    string id = 1;
    string state = 2;
    int64 started_at_unix = 3;
    int32 exit_code = 4;
}

message ExecRequest {
    string instance_id = 1;
    repeated string cmd = 2;
}
message ExecResponse {
    int32 exit_code = 1;
    string stdout = 2;
    string stderr = 3;
}

message InstanceLogsRequest {
    string instance_id = 1;
    int32 tail = 2;
    bool follow = 3;
}

message InstanceStatsRequest {
    string instance_id = 1;
}
message InstanceStatsResponse {
    int32 memory_usage_mb = 1;
    int32 memory_limit_mb = 2;
    double cpu_percent = 3;
    int64 net_rx_bytes = 4;
    int64 net_tx_bytes = 5;
}

// Volumes

message CreateVolumeRequest {
    string name = 1;
}
message CreateVolumeResponse {}

message RemoveVolumeRequest {
    string name = 1;
}
message RemoveVolumeResponse {}

message VolumeSizeRequest {
    string volume_name = 1;
}
message VolumeSizeResponse {
    int64 size_bytes = 1;
}

message BackupVolumeRequest {
    string volume_name = 1;
}

message RestoreVolumeRequest {
    string volume_name = 1;
    bytes data = 2;
}
message RestoreVolumeResponse {}

// File operations

message ListFilesRequest {
    string volume_name = 1;
    string path = 2;
}
message FileEntryMsg {
    string name = 1;
    bool is_dir = 2;
    int64 size = 3;
    int64 mod_time_unix = 4;
    string permissions = 5;
}
message ListFilesResponse {
    repeated FileEntryMsg entries = 1;
}

message ReadFileRequest {
    string volume_name = 1;
    string path = 2;
}
message ReadFileResponse {
    bytes content = 1;
}

message WriteFileRequest {
    string volume_name = 1;
    string path = 2;
    bytes content = 3;
    uint32 perm = 4;
}
message WriteFileResponse {}

message WriteFileStreamRequest {
    string volume_name = 1;
    string path = 2;
    uint32 perm = 3;
    bytes data = 4;
}
message WriteFileStreamResponse {}

message DeletePathRequest {
    string volume_name = 1;
    string path = 2;
}
message DeletePathResponse {}

message CreateDirectoryRequest {
    string volume_name = 1;
    string path = 2;
}
message CreateDirectoryResponse {}

message RenamePathRequest {
    string volume_name = 1;
    string from = 2;
    string to = 3;
}
message RenamePathResponse {}

message DownloadFileRequest {
    string volume_name = 1;
    string url = 2;
    string dest_path = 3;
    string expected_hash = 4; // sha512 hex, empty to skip verification
    int64 max_bytes = 5;      // download size limit, 0 for default
}
message DownloadFileResponse {}

// Copy operations

message CopyFromInstanceRequest {
    string instance_id = 1;
    string path = 2;
}
message CopyFromInstanceResponse {
    bytes content = 1;
}

message CopyToInstanceRequest {
    string instance_id = 1;
    string path = 2;
    bytes content = 3;
}
message CopyToInstanceResponse {}

message CopyDirFromInstanceRequest {
    string instance_id = 1;
    string path = 2;
}

// First message carries metadata, all messages carry data
message CopyTarToInstanceRequest {
    string instance_id = 1;
    string dest_path = 2;
    bytes data = 3;
}
message CopyTarToInstanceResponse {}

// Instance state

enum InstanceState {
    INSTANCE_CREATED = 0;
    INSTANCE_STARTING = 1; // started but ready pattern not yet matched
    INSTANCE_RUNNING = 2;  // ready pattern matched or no pattern configured
    INSTANCE_EXITED = 3;
}

message WatchInstanceStatesRequest {}
message GetAllInstanceStatesRequest {}
message GetAllInstanceStatesResponse {
    repeated InstanceStateUpdate instances = 1;
}
message InstanceStateUpdate {
    string instance_id = 1;
    string instance_name = 2;
    InstanceState state = 3;
    int32 exit_code = 4;
    int64 started_at_unix = 5;
    int64 exited_at_unix = 6;
    bool installed = 7;
}

// Install — run-to-completion, separate from StartInstance

message RunInstallRequest {
    string instance_id = 1;
}
message RunInstallResponse {
    int32 exit_code = 1;
    string output = 2;
}

// Health

message HeartbeatRequest {
    string worker_id = 1;
    int64 cpu_cores = 2;
    int64 memory_total_mb = 3;
    int64 memory_available_mb = 4;
    string lan_ip = 5;
    string external_ip = 6;
    int64 disk_total_mb = 7;
    int64 disk_available_mb = 8;
}
message HeartbeatResponse {
    bool accepted = 1;
}

// Registration

message RegisterRequest {
    string worker_id = 1;
    string grpc_address = 2;
    int64 cpu_cores = 3;
    int64 memory_total_mb = 4;
    int64 memory_available_mb = 5;
    string lan_ip = 6;
    string external_ip = 7;
    int32 port_range_start = 8;
    int32 port_range_end = 9;
    int32 sftp_port = 10;
    int64 disk_total_mb = 11;
    int64 disk_available_mb = 12;
    int64 max_memory_mb = 13;
    double max_cpu = 14;
    int64 max_storage_mb = 15;
    string name = 16;
}
message RegisterResponse {
    bool accepted = 1;
    bytes ca_cert_pem = 2;
    bytes client_cert_pem = 3;
    bytes client_key_pem = 4;
}

// SFTP auth

message SFTPLoginRequest {
    string username = 1;
    string password = 2;
}
message SFTPLoginResponse {
    bool valid = 1;
    string gameserver_id = 2;
    string volume_name = 3;
}

// Discovery

message ListGameserverInstancesRequest {}
message ListGameserverInstancesResponse {
    repeated GameserverInstance instances = 1;
}
message GameserverInstance {
    string instance_id = 1;
    string instance_name = 2;
    string gameserver_id = 3; // extracted from instance name
    string state = 4;         // running, exited, etc.
}

// Game scripts

message PrepareGameScriptsRequest {
    string game_id = 1;
    string gameserver_id = 2;
}
message PrepareGameScriptsResponse {
    string script_dir = 1;
    string defaults_dir = 2;
}

message EnsureDepotRequest {
    uint32 app_id = 1;
    string branch = 2;
    string account_name = 3;
    string refresh_token = 4;
}
// Streamed during EnsureDepot. Progress messages have depot_dir empty.
// The final message has depot_dir set and marks completion.
message EnsureDepotProgress {
    // Set only on the final message — indicates completion.
    string depot_dir = 1;
    bool cached = 2;
    uint64 bytes_downloaded = 3;

    // Set on progress messages during download.
    uint64 completed_bytes = 4;
    uint64 total_bytes = 5;
    int32 completed_chunks = 6;
    int32 total_chunks = 7;
}

message DownloadWorkshopItemRequest {
    string volume_name = 1;
    uint32 app_id = 2;
    uint64 hcontent_file = 3;
    string install_path = 4;
}
message DownloadWorkshopItemResponse {}

message CopyDepotToVolumeRequest {
    string depot_dir = 1;
    string volume_name = 2;
}
message CopyDepotToVolumeResponse {}
